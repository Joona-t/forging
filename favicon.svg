<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Chi-Rho (Chrismon) symbol -->
  <!-- Rho vertical stroke -->
  <line x1="24" y1="4" x2="24" y2="44" stroke="#6b5b4f" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Chi diagonal strokes crossing at center ~y=26 -->
  <line x1="7" y1="12" x2="41" y2="40" stroke="#6b5b4f" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="41" y1="12" x2="7" y2="40" stroke="#6b5b4f" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Rho loop (P curve at top of vertical) -->
  <path d="M 24,4 C 24,4 38,4 38,13.5 C 38,23 24,23 24,23" stroke="#6b5b4f" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>